version: '3.8'

services:
  registry-service:
    build:
      context: ./registry-service
      dockerfile: Dockerfile
    container_name: registry-service
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xmx256m
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8761/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - wetube-network

  postgres:
    image: postgres:16-alpine
    container_name: wetube-postgres
    environment:
      POSTGRES_DB: wetube
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wetube"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wetube-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - wetube-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - wetube-network

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    depends_on:
      registry-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry-service:8761/eureka
      - GATEWAY_TOKEN=mBuIFTo+SjyJOXeNN75zeGIUD6InWfcgwoRp2llZXgs=
      - SECURITY_JWT_SECRET=a111396840caddbdd1b160c64045ebb68baf11ba0cf4996e8526ceb3c67d570b
    restart: on-failure
    networks:
      - wetube-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/wetube?currentSchema=user_service
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry-service:8761/eureka
      - GATEWAY_TOKEN=mBuIFTo+SjyJOXeNN75zeGIUD6InWfcgwoRp2llZXgs=
      - SECURITY_JWT_SECRET=a111396840caddbdd1b160c64045ebb68baf11ba0cf4996e8526ceb3c67d570b
      - SECURITY_JWT_EXPIRATION_TIME=900000
      - SECURITY_JWT_REFRESH_EXPIRATION_TIME=604800000
    restart: on-failure
    networks:
      - wetube-network

  video-service:
    build:
      context: ./video-service
      dockerfile: Dockerfile
    container_name: video-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/wetube?currentSchema=video_service
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin123
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry-service:8761/eureka
      - GATEWAY_TOKEN=mBuIFTo+SjyJOXeNN75zeGIUD6InWfcgwoRp2llZXgs=
      - SPRING_APPLICATION_ROOT_LOCATION=/app/videos
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=1000MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=1000MB
    volumes:
      - video-storage:/app/videos
    user: root
    restart: on-failure
    networks:
      - wetube-network

  transcoding-service:
    build:
      context: ./transcoding-service
      dockerfile: Dockerfile
    container_name: transcoding-service
    depends_on:
      - kafka
      - registry-service
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - SPRING_KAFKA_CONSUMER_GROUP_ID=transcoding-group
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://registry-service:8761/eureka
      - GATEWAY_TOKEN=mBuIFTo+SjyJOXeNN75zeGIUD6InWfcgwoRp2llZXgs=
    volumes:
      - video-storage:/app/videos
    user: root
    restart: on-failure
    shm_size: '2gb'
    networks:
      - wetube-network

volumes:
  postgres-data:
  zookeeper-data:
  kafka-data:
  video-storage:
    driver: local

networks:
  wetube-network:
    driver: bridge
